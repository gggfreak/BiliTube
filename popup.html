<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .toggle {
      position: relative;
      width: 38px;
      height: 20px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .toggle-thumb {
      position: absolute;
      width: 16px;
      height: 16px;
      top: 2px;
      left: 2px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle input:checked ~ .toggle-track { background: #4a9eff; }
    .toggle input:checked ~ .toggle-thumb { left: 20px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .label { color: #aaa; }
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type=range] {
      width: 100px;
      accent-color: #4a9eff;
      cursor: pointer;
    }
    .val {
      font-family: monospace;
      font-size: 12px;
      color: #ccc;
      min-width: 32px;
      text-align: right;
    }
    .divider {
      height: 1px;
      background: #333;
      margin: 10px 0;
    }
    .hint {
      color: #666;
      font-size: 11px;
      text-align: center;
      line-height: 1.45;
    }
    kbd {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      font-family: monospace;
      color: #ccc;
    }
    #status {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 6px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">UniTube</span>
    <label class="toggle" title="Mask subtitles">
      <input type="checkbox" id="toggle">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div class="row">
    <span class="label">Mask subtitles</span>
  </div>

  <div class="row">
    <span class="label">YouTube Shortcuts</span>
    <label class="toggle" title="Enable YouTube style shortcuts (k, j, l, etc.)">
      <input type="checkbox" id="ytShortcuts" checked>
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div class="row">
    <span class="label">Opacity</span>
    <div class="slider-wrap">
      <input type="range" id="opacity" min="0" max="100" value="90">
      <span class="val" id="opacityVal">90%</span>
    </div>
  </div>

  <div class="divider"></div>
  <div class="hint">Drag to move · Resize from corners<br>Double-click mask to reset</div>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
